name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          # Pages serves project sites under /<repo>/. configure-pages exposes the
          # correct base path (e.g. "/my-repo/") via steps.pages.outputs.base_path.
          # For user/org sites (<user>.github.io) or custom domains it is "/".
          NITRO_PRESET: static
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build

      - name: Prepare static output for GitHub Pages
        run: |
          set -euo pipefail
          rm -rf pages-dist
          if [ -d .output/public ]; then
            OUT=.output/public
          elif [ -d dist/client ]; then
            OUT=dist/client
          else
            echo "No static output directory found" >&2
            ls -la . >&2
            exit 1
          fi
          # GitHub Pages won't serve underscore-prefixed paths without this.
          touch "$OUT/.nojekyll"
          # TanStack Start SPA mode emits the shell at _shell.html. Use it as
          # both the index and the 404 fallback so deep links resolve client-side.
          if [ -f "$OUT/_shell.html" ]; then
            cp "$OUT/_shell.html" "$OUT/index.html"
            cp "$OUT/_shell.html" "$OUT/404.html"
          elif [ -f "$OUT/index.html" ]; then
            cp "$OUT/index.html" "$OUT/404.html"
          else
            echo "No shell or index.html produced under $OUT" >&2
            ls -la "$OUT" >&2
            exit 1
          fi
          cat > "$OUT/sitemap.xml" <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${{ steps.pages.outputs.base_url }}/</loc>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          XML
          mkdir -p pages-dist
          cp -R "$OUT"/. pages-dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
